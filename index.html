<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pramod | Personal Website</title>

<style>
:root {
    --bg: #000;
    --text: #fff;
    --accent: #888;
}

.light {
    --bg: #fff;
    --text: #000;
    --accent: #555;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.5s;
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 20px;
}

nav a {
    color: var(--text);
    text-decoration: none;
    margin: 0 10px;
}

.toggle {
    cursor: pointer;
    border: 1px solid var(--text);
    padding: 5px 10px;
}

section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

h1 {
    font-size: 3rem;
}

.fade {
    opacity: 0;
    transform: translateY(20px);
    transition: 1s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

</style>
</head>

<body>

<nav>
    <div>PK</div>
    <div>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#work">Work</a>
        <a href="#contact">Contact</a>
        <span class="toggle" onclick="toggleMode()">🌗</span>
    </div>
</nav>

<section id="home">
    <h1 id="typing"></h1>
    <p class="fade">Building ideas. Learning deeply.</p>
</section>

<section id="about">
    <h1 class="fade">About Me</h1>
    <p class="fade">M.Tech student exploring AI, research, and startups.</p>
</section>

<section id="work">
    <h1 class="fade">My Work</h1>
    <p class="fade">Projects, research, and experiments coming soon.</p>
</section>

<section id="contact">
    <h1 class="fade">Contact</h1>
    <p class="fade">your@email.com</p>
</section>

<script>
// Dark/Light Mode
function toggleMode() {
    document.body.classList.toggle("light");
}

// Typing Effect
const text = "Hi, I'm Pramod";
let i = 0;
function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 100);
    }
}
typing();

// Scroll Animation
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
    faders.forEach(el => {
        const rect = el.getBoundingClientRect().top;
        if (rect < window.innerHeight - 100) {
            el.classList.add('show');
        }
    });
});
</script>

</body>
</html>
