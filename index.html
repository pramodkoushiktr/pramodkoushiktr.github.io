<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pramod</title>

<style>
:root {
    --bg: #000;
    --line: #fff;
}

.light {
    --bg: #fff;
    --line: #000;
}

body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: var(--bg);
    color: var(--line);
}

/* Canvas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* Navbar */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
}

.logo {
    letter-spacing: 2px;
}

.menu {
    display: flex;
    gap: 20px;
}

.menu a {
    text-decoration: none;
    color: var(--line);
    font-size: 13px;
}

/* Mobile Menu */
.hamburger {
    display: none;
    cursor: pointer;
}

.mobile-menu {
    display: none;
    position: fixed;
    top: 60px;
    right: 20px;
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 10px;
}

.mobile-menu a {
    display: block;
    margin: 10px 0;
    color: var(--line);
    text-decoration: none;
}

/* Sections */
section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

/* Responsive */
@media (max-width: 768px) {
    .menu {
        display: none;
    }
    .hamburger {
        display: block;
    }
}

</style>
</head>

<body>

<canvas id="art"></canvas>

<nav>
    <div class="logo">PK</div>

    <div class="menu">
        <a>BLOG</a>
        <a>BOOKS</a>
        <a>TECH</a>
        <a>DHEENAVA</a>
        <a>ABOUT</a>
        <a>CONTACT</a>
    </div>

    <div class="hamburger" onclick="toggleMenu()">☰</div>
</nav>

<div class="mobile-menu" id="mobileMenu">
    <a>BLOG</a>
    <a>BOOKS</a>
    <a>TECH</a>
    <a>DHEENAVA</a>
    <a>ABOUT</a>
    <a>CONTACT</a>
</div>

<section>Welcome to my world</section>
<section>Thoughts & Writing</section>
<section>Books & Learning</section>
<section>Tech Exploration</section>
<section>Dheenava</section>
<section>About Me</section>
<section>Contact</section>

<script>
// Mobile menu
function toggleMenu() {
    const menu = document.getElementById("mobileMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// Canvas
const canvas = document.getElementById("art");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let scrollY = 0;
window.addEventListener("scroll", () => {
    scrollY = window.scrollY;
});

// Sun/Moon angle
let angle = 0;

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const color = getComputedStyle(document.body).getPropertyValue('--line');
    ctx.strokeStyle = color;

    // 🌄 Mountains (bottom only)
    ctx.beginPath();
    for (let x = 0; x < canvas.width; x += 40) {
        let y = canvas.height * 0.8 + Math.sin((x + scrollY*0.3) * 0.01) * 20;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // 🌳 Trees (bottom corners only)
    function drawTree(x, y) {
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x, y - 40);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(x, y - 60, 25, 0, Math.PI * 2);
        ctx.stroke();
    }

    drawTree(80, canvas.height * 0.8);
    drawTree(canvas.width - 80, canvas.height * 0.8);

    // ☀️ Sun / 🌙 Moon (top safe zone)
    let cx = canvas.width * 0.8;
    let cy = 120 + Math.sin(angle) * 30;

    ctx.beginPath();
    ctx.arc(cx, cy, 20, 0, Math.PI * 2);
    ctx.stroke();

    // rays
    for (let i = 0; i < 8; i++) {
        let a = i * (Math.PI / 4);
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * 35, cy + Math.sin(a) * 35);
        ctx.stroke();
    }

    angle += 0.01;

    requestAnimationFrame(draw);
}

draw();

// Resize fix
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
