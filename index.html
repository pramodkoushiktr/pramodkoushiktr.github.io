<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pramod | Artistic Website</title>

<style>
:root {
    --bg: #000;
    --text: #fff;
}

.light {
    --bg: #fff;
    --text: #000;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
}

/* Canvas Background */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    position: fixed;
    width: 100%;
}

nav a {
    color: var(--text);
    text-decoration: none;
    margin: 0 10px;
}

.toggle {
    cursor: pointer;
    border: 1px solid var(--text);
    padding: 5px 10px;
}

/* Sections */
section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

h1 {
    font-size: 3rem;
}

/* Fade Animation */
.fade {
    opacity: 0;
    transform: translateY(20px);
    transition: 1s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
    <div>PK</div>
    <div>
        <a href="#home">HOME</a>
        <a href="#about">ABOUT</a>
        <a href="#work">Work</a>
        <a href="#contact">Contact</a>
        <span class="toggle" onclick="toggleMode()">🌗</span>
    </div>
</nav>

<section id="home">
    <h1 id="typing"></h1>
    <p class="fade">Building ideas. Learning deeply.</p>
</section>

<section id="about">
    <h1 class="fade">About Me</h1>
    <p class="fade">M.Tech student exploring AI, research, and startups.</p>
</section>

<section id="work">
    <h1 class="fade">My Work</h1>
    <p class="fade">Projects coming soon.</p>
</section>

<section id="contact">
    <h1 class="fade">Contact</h1>
    <p class="fade">your@email.com</p>
</section>

<script>
// Dark/Light Mode
function toggleMode() {
    document.body.classList.toggle("light");
}

// Typing Effect
const text = "Hi, I'm Pramod";
let i = 0;
function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 100);
    }
}
typing();

// Scroll Animation
const faders = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
    faders.forEach(el => {
        const rect = el.getBoundingClientRect().top;
        if (rect < window.innerHeight - 100) {
            el.classList.add('show');
        }
    });
});

// 🎨 PARTICLE BACKGROUND
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5),
        vy: (Math.random() - 0.5)
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text');

    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        // bounce
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fill();

        // connect lines
        particles.forEach(p2 => {
            let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
            if (dist < 120) {
                ctx.strokeStyle = ctx.fillStyle;
                ctx.lineWidth = 0.2;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }
        });
    });

    requestAnimationFrame(draw);
}

draw();

// Resize fix
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
