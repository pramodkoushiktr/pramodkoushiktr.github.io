<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pramod | Personal</title>

<style>
:root {
    --bg: #000;
    --line: #fff;
}

.light {
    --bg: #fff;
    --line: #000;
}

body {
    margin: 0;
    overflow-x: hidden;
    background: var(--bg);
    color: var(--line);
    font-family: 'Courier New', monospace;
}

/* Canvas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* Navbar */
nav {
    position: fixed;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 20px;
}

nav a {
    color: var(--line);
    text-decoration: none;
    font-size: 14px;
    letter-spacing: 2px;
}

/* Toggle */
.toggle {
    position: fixed;
    right: 20px;
    top: 20px;
    cursor: pointer;
}

/* Content */
section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
}

</style>
</head>

<body>

<canvas id="art"></canvas>

<nav>
    <a>BLOG</a>
    <a>BOOKS</a>
    <a>TECH</a>
    <a>DHEENAVA</a>
    <a>ABOUT</a>
    <a>CONTACT</a>
</nav>

<div class="toggle" onclick="toggleMode()">🌗</div>

<section>Welcome to my world</section>

<script>
function toggleMode() {
    document.body.classList.toggle("light");
}

// Canvas Setup
const canvas = document.getElementById("art");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Sun/Moon
let angle = 0;

// Birds
let birds = [];
for (let i = 0; i < 5; i++) {
    birds.push({
        x: Math.random() * canvas.width,
        y: 100 + Math.random() * 100,
        speed: 1 + Math.random()
    });
}

function drawScene() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const color = getComputedStyle(document.body).getPropertyValue('--line');
    ctx.strokeStyle = color;
    ctx.fillStyle = color;

    // 🌄 Mountains (hand-drawn zigzag)
    ctx.beginPath();
    ctx.moveTo(0, canvas.height * 0.7);

    for (let x = 0; x < canvas.width; x += 50) {
        let y = canvas.height * 0.7 + Math.sin(x * 0.01) * 30;
        ctx.lineTo(x, y);
    }
    ctx.stroke();

    // 🌳 Tree
    ctx.beginPath();
    ctx.moveTo(100, canvas.height * 0.7);
    ctx.lineTo(100, canvas.height * 0.6);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(100, canvas.height * 0.55, 30, 0, Math.PI * 2);
    ctx.stroke();

    // ☀️ Sun / 🌙 Moon
    let cx = canvas.width * 0.8;
    let cy = 100 + Math.sin(angle) * 50;

    ctx.beginPath();
    ctx.arc(cx, cy, 20, 0, Math.PI * 2);
    ctx.stroke();

    angle += 0.01;

    // 🐦 Birds
    birds.forEach(b => {
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(b.x + 10, b.y - 5);
        ctx.lineTo(b.x + 20, b.y);
        ctx.stroke();

        b.x += b.speed;
        if (b.x > canvas.width) b.x = -20;
    });

    requestAnimationFrame(drawScene);
}

drawScene();

// Resize
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
